name: check

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "check_*"
      - "assets/**"
      - "agent/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - "check_*"
      - "assets/**"
      - "agent/**"
      - "**.py"
  workflow_dispatch:

jobs:
  resource:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run readonly checks
        run: |
            python ./check_ci_readonly.py

      # pip install maafw
      - name: Install maafw
        run: |
            python -m pip install --upgrade pip
            python -m pip install --upgrade maafw --pre

      - name: Check Resource
        run: |
            python ./check_resource.py ./assets/resource/
